<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Daily Points</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Daily Points">

  <!-- iOS icon (後で追加でOK) -->
  <!-- <link rel="apple-touch-icon" href="icons/icon-180.png"> -->

  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;max-width:820px;margin:24px auto;padding:0 16px;}
    h1{font-size:20px;margin:0 0 10px;}
    .sub{color:#555;margin:0 0 18px;font-size:14px;line-height:1.4}
    .box{border:1px solid #ddd;border-radius:14px;padding:12px;margin:12px 0;}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    label{display:flex;gap:8px;align-items:center}
    input[type="number"]{width:90px;padding:6px;border-radius:10px;border:1px solid #ccc}
    button{padding:10px 14px;border-radius:12px;border:1px solid #ccc;background:#fff;cursor:pointer}
    .result{font-size:18px}
    .win{font-weight:800}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;border:1px solid #ddd;font-size:12px;color:#444}
    .topbar{display:flex;gap:10px;align-items:center;justify-content:space-between}
    #installBtn{display:none}
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Daily Points</h1>
    <button id="installBtn">ホーム画面に追加</button>
  </div>
  <p class="sub">
    ルール：Total ≥ 60 かつ A/B/C それぞれ1つ以上。<br>
    これはPWA対応（オフライン動作）。
    <span id="swStatus" class="pill">SW: -</span>
  </p>

  <div class="box">
    <h2>🧠 A：知的成長系</h2>
    <div class="row">
      <label><input type="checkbox" id="A_book"> 英語ビジネス書＋メモ (15)</label>
      <label>基礎法学 個数 (2×個数): <input type="number" id="A_law" min="0" value="0"></label>
      <label><input type="checkbox" id="A_psych"> 心理学実験＋メモ (20)</label>
      <label><input type="checkbox" id="A_boki"> 簿記3級 30分 (10)</label>
    </div>
  </div>

  <div class="box">
    <h2>🗣 B：アウトプット系</h2>
    <div class="row">
      <label><input type="checkbox" id="B_news"> ニュース1分スピーキング (20)</label>
      <label><input type="checkbox" id="B_5sent"> 英語5文アウトプット (10)</label>
      <label><input type="checkbox" id="B_ai"> AI会話30分 (25)</label>
    </div>
  </div>

  <div class="box">
    <h2>🏃 C：身体・基礎系</h2>
    <div class="row">
      <label><input type="checkbox" id="C_test"> 英語試験対策 (10)</label>
      <label><input type="checkbox" id="C_run"> 10分ランニング (5)</label>
    </div>
  </div>

  <div class="row">
    <button id="calc">計算する</button>
    <button id="save">今日の結果を保存</button>
    <button id="reset">リセット</button>
    <div class="result" id="out">—</div>
  </div>

  <div class="box">
    <h2>📅 保存ログ（端末内）</h2>
    <div id="history" class="sub">まだ保存なし</div>
  </div>

  <script>
    // ====== Points ======
    const pts = {
      A_book: 15, A_psych: 20, A_boki: 10,
      B_news: 20, B_5sent: 10, B_ai: 25,
      C_test: 10, C_run: 5,
    };

    const idsCheckbox = ["A_book","A_psych","A_boki","B_news","B_5sent","B_ai","C_test","C_run"];

    function checked(id){ return document.getElementById(id).checked; }
    function num(id){ return Number(document.getElementById(id).value || 0); }

    function calcScore(){
      const A = (checked("A_book")?pts.A_book:0) + (num("A_law")*2) + (checked("A_psych")?pts.A_psych:0) + (checked("A_boki")?pts.A_boki:0);
      const B = (checked("B_news")?pts.B_news:0) + (checked("B_5sent")?pts.B_5sent:0) + (checked("B_ai")?pts.B_ai:0);
      const C = (checked("C_test")?pts.C_test:0) + (checked("C_run")?pts.C_run:0);
      const total = A+B+C;
      const win = (total>=60 && A>0 && B>0 && C>0);
      return {A,B,C,total,win};
    }

    function renderResult(){
      const {A,B,C,total,win} = calcScore();
      document.getElementById("out").innerHTML =
        `A=${A} / B=${B} / C=${C} / Total=${total} → ` +
        (win ? `<span class="win">WIN</span>` : `LOSE`);
    }

    // ====== Local history (device only) ======
    const KEY = "dailyPointsHistory_v1";

    function loadHistory(){
      try { return JSON.parse(localStorage.getItem(KEY) || "[]"); }
      catch { return []; }
    }
    function saveHistory(list){
      localStorage.setItem(KEY, JSON.stringify(list));
    }
    function todayStr(){
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return `${yyyy}-${mm}-${dd}`;
    }
    function renderHistory(){
      const list = loadHistory().slice().reverse();
      const el = document.getElementById("history");
      if(list.length===0){ el.textContent = "まだ保存なし"; return; }
      el.innerHTML = list.slice(0,20).map(item =>
        `${item.date} — Total ${item.total} (${item.win ? "WIN" : "LOSE"})`
      ).join("<br>");
    }

    document.getElementById("calc").addEventListener("click", () => {
      renderResult();
    });

    document.getElementById("save").addEventListener("click", () => {
      const {total,win} = calcScore();
      const date = todayStr();
      const list = loadHistory();

      // 同じ日があれば上書き
      const idx = list.findIndex(x => x.date === date);
      const entry = {date,total,win};
      if(idx>=0) list[idx] = entry;
      else list.push(entry);

      saveHistory(list);
      renderHistory();
      renderResult();
    });

    document.getElementById("reset").addEventListener("click", () => {
      idsCheckbox.forEach(id=>document.getElementById(id).checked=false);
      document.getElementById("A_law").value = 0;
      document.getElementById("out").textContent = "—";
    });

    // 初期描画
    renderHistory();

    // ====== PWA: Service Worker ======
    const swStatus = document.getElementById("swStatus");
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          await navigator.serviceWorker.register("./service-worker.js");
          swStatus.textContent = "SW: ready";
        } catch (e) {
          swStatus.textContent = "SW: failed";
        }
      });
    } else {
      swStatus.textContent = "SW: n/a";
    }

    // ====== PWA: Install prompt (Android/Chrome系) ======
    let deferredPrompt = null;
    const installBtn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = "inline-block";
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.style.display = "none";
    });
  </script>
</body>
</html>
